
<div class="min-h-screen bg-gradient-to-br from-slate-200 via-gray-100 to-violet-100 py-16 px-4">
  <div class="max-w-xl mx-auto bg-white/90 backdrop-blur-sm rounded-2xl shadow-md border border-gray-300/60 p-6">

    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
      <div>
        <h2 class="text-xl font-semibold text-gray-900">
          My <span class="text-violet-600">Tasks</span>
        </h2>
        <p class="text-xs text-gray-400 mt-0.5">
          Stay focused & organized
        </p>
      </div>

      <button
        (click)="toggleMode()"
        class="px-4 py-2 bg-gradient-to-r from-violet-600 to-indigo-500 text-white text-sm font-medium rounded-lg 
               hover:from-violet-700 hover:to-indigo-600 transition shadow-md"
      >
        {{ isAddingMode ? '← Back' : '+ Add Task' }}
      </button>
    </div>

    <!-- Add Form -->
    <div *ngIf="isAddingMode; else listView"
         class="bg-gray-50 border border-gray-200 rounded-xl p-4">

      <h3 class="text-sm font-semibold text-gray-700 mb-3">
        Create New Task
      </h3>

      <form [formGroup]="taskForm"
            (ngSubmit)="submitTask()"
            class="space-y-3">

        <input
          type="text"
          formControlName="title"
          placeholder="Task title..."
          class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg 
                 focus:outline-none focus:ring-2 focus:ring-violet-500 transition bg-white"
        >

        <textarea
          formControlName="description"
          placeholder="Description (optional)"
          rows="3"
          class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg 
                 focus:outline-none focus:ring-2 focus:ring-violet-500 transition resize-none bg-white"
        ></textarea>

        <button
          type="submit"
          [disabled]="taskForm.invalid"
          class="w-full py-2 bg-gradient-to-r from-violet-600 to-indigo-500 text-white text-sm font-semibold rounded-lg 
                 hover:from-violet-700 hover:to-indigo-600 transition disabled:opacity-50"
        >
          Save Task
        </button>

      </form>

    </div>

    <!-- List View -->
    <ng-template #listView>

      <!-- Search -->
      <div class="flex items-center gap-2 bg-gray-100 border border-gray-200 rounded-lg px-3 py-2 mb-4">

        <svg class="w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>

        <input
          type="text"
          placeholder="Search tasks..."
          (input)="onSearch($event)"
          class="w-full text-sm outline-none bg-transparent"
        >

      </div>

      <!-- Tasks -->
      <ng-container *ngIf="filteredTasks$ | async as tasks">

        <div *ngIf="tasks.length > 0; else empty"
             class="flex flex-col gap-4">

          <app-todo-item
            *ngFor="let t of tasks; trackBy: trackById"
            [task]="t"
            (deleteRequested)="deleteTaskFromList($event)"
            (toggleRequested)="onToggleTask($event)"
            class="block p-4 bg-gray-50 border border-gray-300/60 rounded-xl
                   hover:bg-violet-50 hover:border-violet-300 hover:shadow-md transition-all duration-200">
          </app-todo-item>

        </div>

        <!-- Empty -->
        <ng-template #empty>
          <div class="text-center py-10 text-gray-400 text-sm">
            📭 No tasks found
          </div>
        </ng-template>

      </ng-container>

    </ng-template>

  </div>

</div>
